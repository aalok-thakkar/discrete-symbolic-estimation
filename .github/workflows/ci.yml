name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install uv
        run: pip install uv

      - name: Sync dependencies
        run: |
          uv sync
          uv pip install -e ".[dev,plot]"

      - name: Lint with ruff
        run: uv run ruff check src/ tests/

      - name: Type-check with mypy
        run: uv run mypy src/dise

      - name: Run unit tests (fast set, Mock backend only)
        run: |
          uv run pytest tests/ \
            --deselect tests/test_scheduler.py::test_gcd_k_5_certified_interval_z3 \
            -k "not z3" \
            -q

  smoke-cli:
    runs-on: ubuntu-latest
    needs: test
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.10" }
      - run: pip install uv
      - run: |
          uv sync
          uv pip install -e ".[dev,plot]"
      - name: `dise list`
        run: uv run dise list
      - name: `dise compare` (smoke)
        run: |
          uv run dise compare 'integer_sqrt_correct_U(1,1023)' \
            --budget 400 --n-seeds 2 --mc-samples 1000 \
            --json-out smoke.json
      - name: `dise plot`
        run: |
          uv run dise plot --report smoke.json --out smoke.png --kind compare
